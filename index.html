<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpperRacing - Fahrzeug & Setup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h2, h3 { color: #ff3b30; }
        .form-group {
            margin-bottom: 15px;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .col {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #bbb;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            background: #e03229;
        }
        hr {
            border: 0;
            border-top: 1px solid #444;
            margin: 20px 0;
        }
        .sub-header {
            font-size: 15px;
            font-weight: bold;
            color: #ff3b30;
            margin-top: 15px;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        #success-message {
            background: #28a745;
            color: white;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>UpperRacing 🏍️</h2>
    
    <!-- FAHRZEUG AUSWAHL & ERSTELLUNG -->
    <div class="form-group">
        <h3>1. Motorrad wählen</h3>
        <select id="bike-select">
            <option value="">-- Bitte Motorrad wählen --</option>
        </select>
    </div>

    <div class="form-group">
        <h3>Oder neues Motorrad hinzufügen</h3>
        <div class="row" style="margin-bottom: 10px;">
            <div class="col"><input type="text" id="bike-brand" placeholder="Marke (z.B. Yamaha)"></div>
            <div class="col"><input type="text" id="bike-model" placeholder="Modell (z.B. R1)"></div>
        </div>
        <input type="text" id="bike-year" placeholder="Baujahr (z.B. 2022)" style="margin-bottom: 10px;">
        <button id="add-bike-btn">Motorrad speichern</button>
    </div>

    <hr>

    <!-- SETUP BEREICH -->
    <div id="setup-section" style="display: none;">
        <h3>2. Setup für das aktuelle Bike</h3>
        
        <!-- Reifendruck -->
        <div class="sub-header">🛞 Reifendruck (bar)</div>
        <div class="row">
            <div class="form-group col">
                <label>Vorne</label>
                <input type="text" id="pressure-front" placeholder="z.B. 2.1">
            </div>
            <div class="form-group col">
                <label>Hinten</label>
                <input type="text" id="pressure-rear" placeholder="z.B. 1.7">
            </div>
        </div>

        <!-- Übersetzung -->
        <div class="sub-header">⚙️ Übersetzung</div>
        <div class="row">
            <div class="form-group col">
                <label>Ritzel Vorne</label>
                <input type="text" id="gear-front" placeholder="z.B. 15">
            </div>
            <div class="form-group col">
                <label>Kettenrad Hinten</label>
                <input type="text" id="gear-rear" placeholder="z.B. 42">
            </div>
        </div>

        <!-- Gabel (Vorne) -->
        <div class="sub-header">🔧 Fahrwerk Gabel (Vorne)</div>
        <div class="form-group">
            <label>Federvorspannung (Ringe / mm)</label>
            <input type="text" id="fork-preload" placeholder="z.B. 5 Ringen sichtbar / 12mm">
        </div>
        <div class="row">
            <div class="form-group col">
                <label>Zugstufe (clicks)</label>
                <input type="text" id="fork-rebound" placeholder="z.B. 10 auf">
            </div>
            <div class="form-group col">
                <label>Druckstufe (clicks)</label>
                <input type="text" id="fork-compression" placeholder="z.B. 12 auf">
            </div>
        </div>

        <!-- Federbein (Hinten) -->
        <div class="sub-header">🔧 Fahrwerk Federbein (Hinten)</div>
        <div class="form-group">
            <label>Federvorspannung (Gewinde / mm)</label>
            <input type="text" id="shock-preload" placeholder="z.B. 10mm Gewinde frei">
        </div>
        <div class="row">
            <div class="form-group col">
                <label>Zugstufe (clicks)</label>
                <input type="text" id="shock-rebound" placeholder="z.B. 14 auf">
            </div>
            <div class="form-group col">
                <label>Druckstufe (High/Low)</label>
                <input type="text" id="shock-compression" placeholder="z.B. 1.5 Umdrehungen">
            </div>
        </div>

        <!-- Notizen -->
        <div class="sub-header">📝 Notizen / Feedback</div>
        <div class="form-group">
            <textarea id="setup-notes" rows="3" placeholder="Wie lief der Turn? Grip, Fahrverhalten etc."></textarea>
        </div>

        <button id="save-setup-btn">Setup speichern</button>
        <div id="success-message">Erfolgreich gespeichert!</div>
    </div>
</div>

<script>
    let appState = {
        selectedBikeId: null,
        bikes: [],
        setups: {}
    };

    function loadData() {
        const savedBikes = localStorage.getItem('ur_bikes');
        const savedSetups = localStorage.getItem('ur_setups');
        
        if (savedBikes) appState.bikes = JSON.parse(savedBikes);
        if (savedSetups) appState.setups = JSON.parse(savedSetups);
    }

    function saveData() {
        localStorage.setItem('ur_bikes', JSON.stringify(appState.bikes));
        localStorage.setItem('ur_setups', JSON.stringify(appState.setups));
    }

    function renderBikes() {
        const select = document.getElementById('bike-select');
        select.innerHTML = '<option value="">-- Bitte Motorrad wählen --</option>';

        appState.bikes.forEach(bike => {
            const option = document.createElement('option');
            option.value = bike.id;
            option.textContent = `${bike.brand} ${bike.model} (${bike.year})`;
            if (bike.id === appState.selectedBikeId) {
                option.selected = true;
            }
            select.appendChild(option);
        });

        const setupSection = document.getElementById('setup-section');
        if (appState.selectedBikeId) {
            setupSection.style.display = 'block';
            loadSetup();
        } else {
            setupSection.style.display = 'none';
        }
    }

    function loadSetup() {
        const setup = appState.setups[appState.selectedBikeId] || {
            front: '', rear: '',
            gearFront: '', gearRear: '',
            forkPreload: '', forkRebound: '', forkCompression: '',
            shockPreload: '', shockRebound: '', shockCompression: '',
            notes: ''
        };
        
        document.getElementById('pressure-front').value = setup.front;
        document.getElementById('pressure-rear').value = setup.rear;
        document.getElementById('gear-front').value = setup.gearFront;
        document.getElementById('gear-rear').value = setup.gearRear;
        document.getElementById('fork-preload').value = setup.forkPreload;
        document.getElementById('fork-rebound').value = setup.forkRebound;
        document.getElementById('fork-compression').value = setup.forkCompression;
        document.getElementById('shock-preload').value = setup.shockPreload;
        document.getElementById('shock-rebound').value = setup.shockRebound;
        document.getElementById('shock-compression').value = setup.shockCompression;
        document.getElementById('setup-notes').value = setup.notes;
    }

    document.getElementById('add-bike-btn').addEventListener('click', () => {
        const brand = document.getElementById('bike-brand').value.trim();
        const model = document.getElementById('bike-model').value.trim();
        const year = document.getElementById('bike-year').value.trim();

        if (!brand || !model) {
            alert('Bitte mindestens Marke und Modell eingeben!');
            return;
        }

        const newBike = {
            id: 'bike_' + Date.now(),
            brand: brand,
            model: model,
            year: year || 'k.A.'
        };

        appState.bikes.push(newBike);
        appState.selectedBikeId = newBike.id;
        saveData();
        renderBikes();

        document.getElementById('bike-brand').value = '';
        document.getElementById('bike-model').value = '';
        document.getElementById('bike-year').value = '';
    });

    document.getElementById('bike-select').addEventListener('change', (e) => {
        appState.selectedBikeId = e.target.value;
        renderBikes();
    });

    document.getElementById('save-setup-btn').addEventListener('click', () => {
        if (!appState.selectedBikeId) return;

        appState.setups[appState.selectedBikeId] = {
            front: document.getElementById('pressure-front').value,
            rear: document.getElementById('pressure-rear').value,
            gearFront: document.getElementById('gear-front').value,
            gearRear: document.getElementById('gear-rear').value,
            forkPreload: document.getElementById('fork-preload').value,
            forkRebound: document.getElementById('fork-rebound').value,
            forkCompression: document.getElementById('fork-compression').value,
            shockPreload: document.getElementById('shock-preload').value,
            shockRebound: document.getElementById('shock-rebound').value,
            shockCompression: document.getElementById('shock-compression').value,
            notes: document.getElementById('setup-notes').value
        };

        saveData();

        const msg = document.getElementById('success-message');
        msg.style.display = 'block';
        setTimeout(() => {
            msg.style.display = 'none';
        }, 2000);
    });

    loadData();
    renderBikes();
</script>

</body>
</html>
